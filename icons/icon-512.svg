<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0a0a0f"/>
  <!-- Grid lines -->
  <g stroke="rgba(0,212,212,0.18)" stroke-width="1.5">
    <line x1="128" y1="128" x2="128" y2="384"/>
    <line x1="192" y1="128" x2="192" y2="384"/>
    <line x1="256" y1="128" x2="256" y2="384"/>
    <line x1="320" y1="128" x2="320" y2="384"/>
    <line x1="384" y1="128" x2="384" y2="384"/>
    <line x1="128" y1="128" x2="384" y2="128"/>
    <line x1="128" y1="192" x2="384" y2="192"/>
    <line x1="128" y1="256" x2="384" y2="256"/>
    <line x1="128" y1="320" x2="384" y2="320"/>
    <line x1="128" y1="384" x2="384" y2="384"/>
  </g>
  <!-- Star points -->
  <circle cx="192" cy="192" r="4" fill="rgba(0,212,212,0.35)"/>
  <circle cx="320" cy="192" r="4" fill="rgba(0,212,212,0.35)"/>
  <circle cx="256" cy="256" r="4" fill="rgba(0,212,212,0.35)"/>
  <circle cx="192" cy="320" r="4" fill="rgba(0,212,212,0.35)"/>
  <circle cx="320" cy="320" r="4" fill="rgba(0,212,212,0.35)"/>
  <!-- Black stone -->
  <circle cx="256" cy="192" r="52" fill="#0d0d12"/>
  <circle cx="256" cy="192" r="52" fill="url(#bs512)" opacity="0.6"/>
  <!-- White stone -->
  <circle cx="192" cy="320" r="52" fill="#f0ead6"/>
  <circle cx="192" cy="320" r="44" fill="url(#ws512)" opacity="0.4"/>
  <!-- Gold chi spark -->
  <circle cx="320" cy="320" r="14" fill="#D4A017" opacity="0.9"/>
  <circle cx="320" cy="320" r="24" fill="none" stroke="#D4A017" stroke-width="2.5" opacity="0.4"/>
  <circle cx="320" cy="320" r="34" fill="none" stroke="#D4A017" stroke-width="1" opacity="0.15"/>
  <!-- Title text -->
  <text x="256" y="448" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="48" fill="#D4A017" letter-spacing="6">AniGO</text>
  <defs>
    <radialGradient id="bs512" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d0d12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ws512" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0ead6" stop-opacity="0"/>
    </radialGradient>
  </defs>
