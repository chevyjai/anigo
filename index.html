<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AniGO</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A017">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AniGO">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

  <!-- TITLE SCREEN — clean art, all text is dynamic/translatable -->
  <div id="title-screen" class="screen splash-entrance">
    <div class="splash-hero-img"></div>
    <div class="splash-hero-fade"></div>
    <div class="splash-energy-pulse"></div>
    <div id="splash-particles"></div>

    <!-- Top-right: profile + language -->
    <div class="splash-top-right">
      <button id="btn-player-profile" class="player-profile-btn" aria-label="Player Profile">
        <span class="profile-icon">棋</span>
      </button>
      <div class="splash-lang" id="title-lang-selector"></div>
    </div>

    <!-- Player profile panel (hidden by default) -->
    <div id="player-profile-panel" class="player-profile-panel hidden">
      <div class="profile-panel-header">
        <span class="profile-panel-icon">棋</span>
        <span class="profile-panel-name" id="profile-name"></span>
      </div>
      <div class="profile-panel-stats">
        <div class="profile-stat-row">
          <span class="profile-stat-label">대국</span>
          <span class="profile-stat-value" id="profile-games">0</span>
        </div>
        <div class="profile-stat-row">
          <span class="profile-stat-label">승률</span>
          <span class="profile-stat-value" id="profile-winrate">—</span>
        </div>
        <div class="profile-stat-row">
          <span class="profile-stat-label">승/패</span>
          <span class="profile-stat-value" id="profile-record">0 / 0</span>
        </div>
        <div class="profile-stat-row">
          <span class="profile-stat-label">총 따냄</span>
          <span class="profile-stat-value" id="profile-captures">0</span>
        </div>
        <div class="profile-stat-row" id="profile-fav-row">
          <span class="profile-stat-label">최애 챔피언</span>
          <span class="profile-stat-value" id="profile-fav-champ">—</span>
        </div>
      </div>
      <button id="btn-kakao-login" class="kakao-login-btn">
        <span class="kakao-icon">💬</span> 카카오 로그인
      </button>
    </div>

    <!-- Dynamic title + tagline (top-left) -->
    <div class="splash-title-overlay">
      <div class="splash-title-text">AniGO</div>
      <div class="splash-tagline" id="splash-tagline">직관이 알고리즘을 이기는 순간</div>
    </div>

    <!-- Game mode buttons (bottom-right) -->
    <div class="splash-buttons">
      <button id="btn-puzzle" class="splash-btn splash-btn-primary splash-btn-puzzle">
        <span class="splash-btn-icon">🧩</span>
        <span class="splash-btn-text">
          <span id="splash-btn-puzzle-title">퍼즐 모드</span>
          <span class="splash-btn-sub" id="splash-btn-puzzle-sub">100+ 마법 바둑 퍼즐</span>
        </span>
      </button>
      <button id="btn-vs-ai" class="splash-btn">
        <span class="splash-btn-icon">🤖</span>
        <span class="splash-btn-text">
          <span id="splash-btn-launch">AI 대전</span>
          <span class="splash-btn-sub" id="splash-btn-ai-sub">챔피언을 선택하고 AI와 대결</span>
        </span>
      </button>
      <button id="btn-local" class="splash-btn">
        <span class="splash-btn-icon">👥</span>
        <span class="splash-btn-text">
          <span id="splash-btn-local">2인 대전</span>
          <span class="splash-btn-sub" id="splash-btn-local-sub">친구와 함께 플레이</span>
        </span>
      </button>
      <button id="btn-challenge-friend" class="splash-btn splash-btn-social">
        <span class="splash-btn-icon">⚔️</span>
        <span class="splash-btn-text">
          <span id="splash-btn-challenge">친구 도전</span>
          <span class="splash-btn-sub" id="splash-btn-challenge-sub">카톡으로 도전장을 보내세요</span>
        </span>
      </button>
      <button id="btn-how-to-play" class="splash-btn splash-btn-small">
        <span id="splash-btn-help">플레이 방법</span>
      </button>
    </div>

    <!-- Web3 teaser (bottom-left, subtle) -->
    <div class="splash-web3-teaser" id="splash-web3-teaser">
      <div class="web3-teaser-title">
        <span class="web3-diamond">◆</span> WEB3 <span class="web3-badge-soon">COMING SOON</span>
      </div>
      <div class="web3-teaser-items">
        <div class="web3-teaser-item">
          <span class="web3-item-icon">🎴</span>
          <span class="web3-item-text" id="web3-nft-skins">NFT 주문 스킨</span>
        </div>
        <div class="web3-teaser-item">
          <span class="web3-item-icon">🏆</span>
          <span class="web3-item-text" id="web3-token-wager">토큰 베팅 대전</span>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAMPION SELECT SCREEN -->
  <div id="champion-select" class="screen hidden">
    <button id="btn-back-title" class="btn-back" aria-label="Back">← 뒤로</button>
    <div class="champ-select-top">
      <div class="champ-select-header" id="champ-select-header"></div>
      <div class="champ-select-sub" id="champ-select-sub"></div>
      <div class="difficulty-selector" id="difficulty-selector">
        <button class="diff-btn" data-diff="easy">쉬움</button>
        <button class="diff-btn active" data-diff="normal">보통</button>
        <button class="diff-btn" data-diff="hard">어려움</button>
      </div>
    </div>
    <div class="champ-select-body">
      <div class="champ-grid-panel">
        <div id="champ-grid"></div>
      </div>
      <div id="champ-detail" class="champ-detail hidden"></div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen hidden">
    <header class="game-header glass-panel">
      <div class="header-logo">AniGO</div>
      <div class="header-center">
        <span id="turn-indicator" class="turn-pill turn-black"></span>
        <span id="turn-number"></span>
      </div>
      <div class="header-right">
        <span id="chi-display"><span class="chi-icon"><span class="chi-gem"></span><span class="chi-gem-shine"></span></span> <span class="chi-count">3</span></span>
        <span id="phase-label"></span>
        <button id="btn-help-ingame" class="btn-help" aria-label="?">?</button>
        <div class="header-lang-selector lang-selector" id="header-lang-selector"></div>
      </div>
    </header>

    <aside class="spell-panel glass-panel">
      <div class="panel-section">
        <div class="panel-label" id="label-champion-name"></div>
        <div class="panel-passive" id="passive-display"></div>
        <div class="panel-label" id="label-your-spells">SPELLS</div>
        <div id="spell-hand"></div>
      </div>
      <div class="panel-section">
        <div class="panel-label" id="label-stats">STATS</div>
        <div class="panel-stat"><span id="label-captures">Captures</span><span class="panel-stat-value" id="player-captures">0</span></div>
      </div>
      <div class="panel-section opponent-info">
        <div class="panel-label" id="label-opponent">OPPONENT</div>
        <div class="panel-stat"><span id="label-opp-chi">Chi</span><span class="panel-stat-value" id="opp-chi">3</span></div>
        <div class="panel-stat"><span id="label-opp-captures">Captures</span><span class="panel-stat-value" id="opp-captures">0</span></div>
      </div>
      <div style="flex:1;"></div>
      <button id="btn-pass" class="btn btn-pass"><span id="pass-label">PASS</span><span class="btn-pass-hint" id="pass-hint">+2 Chi</span></button>
    </aside>

    <main class="board-area" style="position:relative;">
      <div id="action-prompt" class="action-prompt"></div>
      <canvas id="board-canvas"></canvas>
    </main>

    <footer class="game-log glass-panel">
      <span class="game-log-label" id="log-label">LOG</span>
      <span id="game-log-text"></span>
    </footer>
  </div>

  <!-- SCORING SCREEN -->
  <div id="scoring-screen" class="screen hidden">
    <div id="winner-text"></div>
    <div class="scoring-board">
      <canvas id="scoring-canvas"></canvas>
    </div>
    <div class="score-breakdown">
      <div class="score-column">
        <div class="score-label" id="score-label-black">BLACK</div>
        <div class="score-value" id="score-black">0</div>
        <div class="score-detail" id="score-black-detail"></div>
      </div>
      <div class="score-column">
        <div class="score-label" id="score-label-white">WHITE</div>
        <div class="score-value" id="score-white">0</div>
        <div class="score-detail" id="score-white-detail"></div>
      </div>
    </div>
    <div id="post-game-learning" class="post-game-learning hidden"></div>
    <div class="scoring-actions">
      <button id="btn-share-kakao" class="btn btn-share btn-share-kakao" aria-label="Share on KakaoTalk">
        <span class="kakao-share-icon">💬</span>
        <span id="share-kakao-label">카카오톡 공유</span>
      </button>
      <button id="btn-share" class="btn btn-share" aria-label="Share result">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span id="share-label">공유하기</span>
      </button>
      <button id="btn-rematch-challenge" class="btn btn-share btn-challenge-rematch" aria-label="Challenge friend">
        <span>⚔️</span>
        <span id="rematch-challenge-label">친구 도전</span>
      </button>
      <button id="btn-play-again" class="btn btn-primary">Play Again</button>
    </div>
  </div>

  <!-- PUZZLE SELECT SCREEN -->
  <div id="puzzle-select" class="screen hidden">
    <div class="puzzle-select-header glass-panel">
      <button id="puzzle-btn-back-title" class="btn-back" aria-label="Back">← 뒤로</button>
      <div class="puzzle-select-title">퍼즐 모드</div>
      <div class="puzzle-hint-tokens">
        <span class="hint-token-icon">&#128161;</span>
        <span id="puzzle-hint-tokens-count">3</span>
      </div>
    </div>
    <div class="puzzle-world-map-scroll">
      <div id="puzzle-loading" class="puzzle-loading">
        <div class="puzzle-loading-spinner"></div>
        <div class="puzzle-loading-text">퍼즐 로딩 중...</div>
      </div>
      <div id="puzzle-world-map" class="puzzle-world-map"></div>
    </div>
  </div>

  <!-- PUZZLE PLAY SCREEN -->
  <div id="puzzle-play" class="screen hidden">
    <div class="puzzle-play-header glass-panel">
      <button id="puzzle-btn-back" class="btn-back puzzle-back" aria-label="Back">←</button>
      <div class="puzzle-header-center">
        <div class="puzzle-title" id="puzzle-title"></div>
        <div class="puzzle-goal glass-panel" id="puzzle-goal">
          <span class="puzzle-goal-icon">&#127919;</span>
          <span id="puzzle-goal-text"></span>
        </div>
      </div>
      <div class="puzzle-header-right">
        <div class="puzzle-moves-display">
          <span class="puzzle-moves-label">수</span>
          <span class="puzzle-moves-count" id="puzzle-moves">0 / ?</span>
        </div>
        <div class="puzzle-star-preview" id="puzzle-star-preview">
          <span class="preview-star active">&#9733;</span>
          <span class="preview-star active">&#9733;</span>
          <span class="preview-star active">&#9733;</span>
        </div>
      </div>
    </div>

    <main class="puzzle-board-area">
      <canvas id="puzzle-board-canvas"></canvas>
    </main>

    <div class="puzzle-controls glass-panel">
      <div class="puzzle-spell-bar" id="puzzle-spell-bar"></div>
      <div class="puzzle-action-bar">
        <button class="puzzle-action-btn" id="puzzle-btn-undo" disabled>
          <span class="action-icon">&#8630;</span>
          <span class="action-label">되돌리기</span>
        </button>
        <button class="puzzle-action-btn puzzle-hint-btn" id="puzzle-btn-hint">
          <span class="action-icon">&#128161;</span>
          <span class="action-label">힌트 <span id="puzzle-hint-count">3</span></span>
        </button>
        <button class="puzzle-action-btn" id="puzzle-btn-reset">
          <span class="action-icon">&#8635;</span>
          <span class="action-label">초기화</span>
        </button>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="puzzle-toast" class="puzzle-toast hidden"></div>

    <!-- Complete/Failed overlay -->
    <div id="puzzle-complete-overlay" class="puzzle-complete-overlay hidden"></div>
  </div>

  <!-- HOW TO PLAY MODAL -->
  <div id="how-to-play-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="How to Play">
    <div class="modal-content glass-panel" id="how-to-play-content"></div>
  </div>

  <!-- KakaoTalk SDK (replace YOUR_KAKAO_APP_KEY with real key) -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" integrity="sha384-DKYJZ8NLiK8MN4/C5P2vDkMv4DShgBbWeSUuAlMWamCxEm8x3bD+z/1mzpLj+" crossorigin="anonymous" defer></script>

  <script type="module" src="js/ui.js?v=5"></script>
  <!-- puzzle-ui.js loaded lazily when user enters puzzle mode -->

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
